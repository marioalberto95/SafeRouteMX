<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verificar Código - SafeRoute MX</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body style="background:#f4f6f9;">

<nav class="navbar navbar-dark" style="background:#dc3545;">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">🚨 SafeRoute MX</a>
    </div>
</nav>

<div class="container my-5">
    <div class="row justify-content-center">
        <div class="col-12 col-md-5">

            <div class="card shadow p-4" style="border-radius:22px;">

                <h2 class="text-center mb-3">
                    Verificar correo
                </h2>

                <p class="text-center text-muted">
                    Ingresa el código que enviamos a tu correo.
                </p>

                {% if error %}
                <div class="alert alert-danger">
                    ❌ {{ error }}
                </div>
                {% endif %}

                <form method="POST" action="/verificar">

                    <div class="mb-3">
                        <label class="form-label fw-bold">Código de verificación</label>
                        <input type="text" name="codigo" class="form-control text-center" maxlength="6" required>
                    </div>

                    <button type="submit" class="btn btn-danger w-100">
                        Verificar cuenta
                    </button>

                </form>

            </div>

        </div>
    </div>
</div>

</body>
</html>
